<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Pokemon Details</title>
</head>

<body>

    <main>
        <h1 class="heading">Pokemon Details</h1>
        <div class="input-details">
            <input type="text" placeholder="Enter Pokrmon Name" id="pokemonInput" list="pokemons">
            <datalist id="pokemons">
                <option value="Pikachu"></option>
                <option value="Charizard"></option>
                <option value="Greninja"></option>
                <option value="Eevee"></option>
                <option value="Mewtwo"></option>
                <option value="Gengar"></option>
                <option value="Lucario"></option>
                <option value="Bulbasaur"></option>
                <option value="Arcanine"></option>
                <option value="Squirtle "></option>
            </datalist>
            <button id="pokemonInputSubmit">Submit</button>
        </div>

        <div id="icon">
            <h1 id="pokemonName"></h1>
            <img src="" alt="" id="pokemonImage">
        </div>

        <div class="details">
            <p id="pokemonHeight" class="pokemons-details"></p>
            <p id="pokemonWeight" class="pokemons-details"></p>
            <p id="pokemonType" class="pokemons-details"></p>
            <p id="pokemonAbility" class="pokemons-details"></p>
        </div>
    </main>

    <div id="loading">
        <h3>Loading...</h3>
    </div>


    <script src="script.js"></script>
</body>

</html>
